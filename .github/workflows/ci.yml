name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege: the CI job only needs to read contents.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Pinned to full-length commit SHAs (not mutable tags) so a compromised
      # tag can't inject into our pipeline (supply-chain hardening).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      # Full audit (prod + dev) — fail the build on any advisory.
      - name: Audit dependencies
        run: pnpm audit --audit-level=moderate
